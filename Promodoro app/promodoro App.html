<body>

<div class="container">
  <h1>Pomodoro Timer</h1>
  <div id="timer">25:00</div>

<button class="start" onclick="startTimer()">Start</button> <button class="pause" onclick="pauseTimer()">Pause</button> <button class="reset" onclick="resetTimer()">Reset</button>

</div>

<script>
  let time = 25 * 60; // 25 minutes
  let timerInterval;
  let isRunning = false;

  function updateDisplay() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerText =
      (minutes < 10 ? "0" : "") + minutes + ":" +
      (seconds < 10 ? "0" : "") + seconds;
  }

  function startTimer() {
    if (isRunning) return;

    isRunning = true;
    timerInterval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(timerInterval);
        alert("Time's up! Take a break.");
        isRunning = false;
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(timerInterval);
    isRunning = false;
  }

  function resetTimer() {
    clearInterval(timerInterval);
    time = 25 * 60;
    isRunning = false;
    updateDisplay();
  }
</script>

</body>
</html>
