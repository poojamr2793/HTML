<!DOCTYPE html>
<html lang="en">
<head>
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('animals')">Animals</button>
</div>

<div class="gallery">
  <img src="img1.jpg" class="image nature">
  <img src="img2.jpg" class="image animals">
  <img src="img3.jpg" class="image nature">
  <img src="img4.jpg" class="image animals">
</div>

<script src="script.js"></script>
</body>
</html>
