<body>

<h1>🎲 Dice Game</h1>

<div class="dice-container">
  <div class="player">
    <h2>Player 1</h2>
    <div id="dice1" class="dice">🎲</div>
  </div>

  <div class="player">
    <h2>Player 2</h2>
    <div id="dice2" class="dice">🎲</div>
  </div>
</div>

<button onclick="rollDice()">Roll Dice</button>

<div id="result"></div>

<script>
  function rollDice() {
    let random1 = Math.floor(Math.random() * 6) + 1;
    let random2 = Math.floor(Math.random() * 6) + 1;

    document.getElementById("dice1").innerText = getDiceEmoji(random1);
    document.getElementById("dice2").innerText = getDiceEmoji(random2);

    if (random1 > random2) {
      document.getElementById("result").innerText = "Player 1 Wins!";
    } else if (random2 > random1) {
      document.getElementById("result").innerText = "Player 2 Wins!";
    } else {
      document.getElementById("result").innerText = "It's a Draw!";
    }
  }

  function getDiceEmoji(num) {
    const dice = ["⚀","⚁","⚂","⚃","⚄","⚅"];
    return dice[num - 1];
  }
</script>

</body>
