<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Calculator</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    width:200px;
    padding:10px;
    margin:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="calculator">

<h2>Simple Calculator</h2>

<input type="number" id="num1" placeholder="Enter first number"><br>
<input type="number" id="num2" placeholder="Enter second number"><br>

<button onclick="add()">+</button>
<button onclick="subtract()">-</button>
<button onclick="multiply()">*</button>
<button onclick="divide()">/</button>

<h3 id="result"></h3>

</div>

<script>

function add(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerHTML = "Result: " + (a+b);
}

function subtract(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerHTML = "Result: " + (a-b);
}

function multiply(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerHTML = "Result: " + (a*b);
}

function divide(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerHTML = "Result: " + (a/b);
}

</script>

</body>
</html>
