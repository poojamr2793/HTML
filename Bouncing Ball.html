<!DOCTYPE html>
<html>
<head>
<style>
.ball {
  width: 80px;
  height: 80px;
  background: orange;
  border-radius: 50%;
  position: relative;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from { top: 0px; }
  to { top: 200px; }
}
</style>
</head>

<body>

<h2>Bouncing Ball</h2>
<div class="ball"></div>

</body>
</html>
