<!DOCTYPE html>
<html>
<head>
<title>Fibonacci Series</title>
</head>
<body>

<h2>Fibonacci Series</h2>

Enter number:
<input type="number" id="num">

<button onclick="fib()">Generate</button>

<p id="result"></p>

<script>
function fib(){
    let n = document.getElementById("num").value;
    let a = 0, b = 1, c;
    let output = a + " " + b;

    for(let i = 2; i < n; i++){
        c = a + b;
        output += " " + c;
        a = b;
        b = c;
    }

    document.getElementById("result").innerText = output;
}
</script>

</body>
</html>
