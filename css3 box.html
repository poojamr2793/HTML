<!DOCTYPE html>
<html>
<head>
<title>CSS3 Box Model </title>

<style>
.box{
    width:300px;                 /* Content width */
    height:150px;                /* Content height */
    padding:20px;                /* Space inside the border */
    border:5px solid blue;       /* Border around padding */
    margin:40px;                 /* Space outside the border */
    background-color:lightgray;  /* Background color */
    box-sizing:border-box;       /* Includes padding and border in width/height */
}
</style>

</head>
<body>

<h2>CSS3 Box Model Example</h2>

<div class="box">
This is the content area of the box.  
Padding creates space inside the border,  
border surrounds the padding,  
and margin creates space outside the border.
</div>

</body>
</html>
