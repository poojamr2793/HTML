<!DOCTYPE html>
<html>
<head>
<title>CSS Position Example</title>

<style>
body{
  font-family: Arial;
  height:2000px;
}

/* STATIC */
.static-box{
  position: static;
  border:2px solid blue;
  padding:10px;
  margin:10px;
}

/* RELATIVE */
.relative-box{
  position: relative;
  left:40px;
  top:10px;
  border:2px solid green;
  padding:10px;
  margin:10px;
}

/* ABSOLUTE */
.container{
  position: relative;
  border:2px solid black;
  height:150px;
  margin:10px;
}

.absolute-box{
  position: absolute;
  top:20px;
  right:20px;
  background:orange;
  padding:10px;
}

/* FIXED */
.fixed-box{
  position: fixed;
  bottom:10px;
  right:10px;
  background:red;
  color:white;
  padding:10px;
}

/* STICKY */
.sticky-box{
  position: sticky;
  top:0;
  background:purple;
  color:white;
  padding:10px;
}
</style>

</head>

<body>

<div class="sticky-box">
Sticky Position (Scroll to see effect)
</div>

<div class="static-box">
Static Position (Default)
</div>

<div class="relative-box">
Relative Position (Moved from original place)
</div>

<div class="container">
Container (Relative Parent)

<div class="absolute-box">
Absolute Position
</div>

</div>

<div class="fixed-box">
Fixed Position
</div>

<p>Scroll down to see sticky and fixed behavior.</p>

</body>
</html>
