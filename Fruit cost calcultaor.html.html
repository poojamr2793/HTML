<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Fruit Cost Calculator</title> 
 
  <!-- Bootstrap CSS --> 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
 
  <style> 
   body{ 
    background-color: #f5f5f5; 
    display: flex; 
    min-height: 100vh; 
    justify-content: center; 
    align-items: center; 
    font-family: Arial, sans-serif; 
  } 
 
  .card { 
    border-radius: 10px; 
    background: white; 
    width: 600px; 
    border: 1px solid #333; 
  } 
  th { 
    background: #000; 
    color: #fff; 
    font-weight: bold; 
  } 
  table { 
    border: 2px solid #000; 
  } 
  td, th { 
    border: 1px solid #000 !important; 
  } 
  .btn-custom { 
    background: #000; 
    color: #fff; 
    border-radius: 30px; 
    transition: 0.3s; 
  } 
  .btn-custom:hover { 
    background: #444; 
    transform: scale(1.05); 
  } 
  </style> 
</head> 
 
<div class="card shadow p-4"> 
  <h4 class="text-center fw-bold mb-3">Fruit Cost Calculator</h4> 
 
  <form onsubmit="return calculateTotal();"> 
    <table class="table table-sm text-center align-middle"> 
      <thead> 
        <tr> 
          <th>Select</th> 
          <th>Fruit</th> 
          <th>Price</th> 
          <th>Qty</th> 
        </tr> 
      </thead> 
 
      <tbody> 
        <tr> 
          <td><input type="checkbox" id="apple" onclick="updateCost('apple');"></td> 
          <td>Apple</td> 
          <td>$0.59</td> 
          <td><input type="number" id="qtyApple" class="form-control form-control-sm" min="0" 
value="0"></td> 
        </tr> 
 
        <tr> 
          <td><input type="checkbox" id="orange" onclick="updateCost('orange');"></td> 
          <td>Orange</td> 
          <td>$0.49</td> 
          <td><input type="number" id="qtyOrange" class="form-control form-control-sm" 
min="0" value="0"></td> 
        </tr> 
 
        <tr> 
          <td><input type="checkbox" id="banana" onclick="updateCost('banana');"></td> 
          <td>Banana</td> 
          <td>$0.39</td> 
          <td><input type="number" id="qtyBanana" class="form-control form-control-sm" 
min="0" value="0"></td> 
        </tr> 
      </tbody> 
    </table> 
 
    <div class="text-center"> 
      <button type="submit" class="btn btn-custom px-4 w-50 fw-bold mt-3">Check 
Total</button> 
    </div> 
  </form> 
</div> 
 
<script> 
  let totalCost = 0; 
 
  const prices = { 
    apple: 0.59, 
    orange: 0.49, 
    banana: 0.39 
  }; 
 
  function updateCost(item) { 
    const checkbox = document.getElementById(item); 
    const qty = parseInt(document.getElementById("qty" + capitalize(item)).value); 
 
    if (checkbox.checked) { 
      totalCost += prices[item] * qty; 
    } else { 
      totalCost -= prices[item] * qty; 
    } 
  } 
 
  function calculateTotal() { 
    const tax = totalCost * 0.05; 
    const finalAmount = (totalCost + tax).toFixed(2); 
    alert(`Your total cost is $${finalAmount}`); 
    return false; // Prevent actual form submission 
  } 
 
  function capitalize(word) { 
    return word.charAt(0).toUpperCase() + word.slice(1); 
  } 
</script> 
 
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> 
</body> 
</html>
